<!DOCTYPE html>
<html>
<head>
<title>Student Profile Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#26cbf9,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#5adeff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0, 0, 0, 0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#000000;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #f5e4ff;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#007BFF;
    color:white;
    font-size:17px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

.card{
    margin-top:20px;
    display:none;
    border:2px solid #007BFF;
    border-radius:12px;
    padding:20px;
    text-align:center;
    background:#eae4f9;
}

.card img{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:10px;
}

.card h3{
    color:#007BFF;
    margin-bottom:10px;
}

.card p{
    font-size:17px;
    margin:8px 0;
}

.grade{
    font-size:20px;
    font-weight:bold;
    color:green;
}

.result{
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <h2>Student Profile</h2>

    <input type="text" id="name" placeholder="Enter Student Name">

    <input type="text" id="roll" placeholder="Enter Roll Number">

    <input type="number" id="marks" placeholder="Enter Marks">

    <button onclick="displayProfile()">Display Profile</button>

    <div class="card" id="profileCard">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Student">

        <h3 id="studentName"></h3>

        <p><b>Roll No :</b> <span id="studentRoll"></span></p>

        <p><b>Marks :</b> <span id="studentMarks"></span></p>

        <p class="grade"><b>Grade :</b> <span id="studentGrade"></span></p>

        <p class="result"><b>Result :</b> <span id="studentResult"></span></p>

    </div>

</div>

<script>

function displayProfile(){

    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;
    let marks = parseInt(document.getElementById("marks").value);

    if(name=="" || roll=="" || isNaN(marks)){
        alert("Please fill all the details.");
        return;
    }

    if(marks<0 || marks>100){
        alert("Marks should be between 0 and 100.");
        return;
    }

    let grade = "";
    let result = "";

    if(marks>=90){
        grade="A+";
        result="Pass";
    }
    else if(marks>=80){
        grade="A";
        result="Pass";
    }
    else if(marks>=70){
        grade="B";
        result="Pass";
    }
    else if(marks>=60){
        grade="C";
        result="Pass";
    }
    else if(marks>=50){
        grade="D";
        result="Pass";
    }
    else{
        grade="F";
        result="Fail";
    }

    document.getElementById("studentName").innerHTML = name;
    document.getElementById("studentRoll").innerHTML = roll;
    document.getElementById("studentMarks").innerHTML = marks;
    document.getElementById("studentGrade").innerHTML = grade;
    document.getElementById("studentResult").innerHTML = result;

    document.getElementById("profileCard").style.display = "block";
    let resultElement = document.getElementById("studentResult");
    resultElement.innerHTML = result;
    if(result == "Pass"){
        resultElement.style.color = "green";
    }
    else{
        resultElement.style.color = "red";
    }
    document.getElementById("profileCard").style.display = "block";
}
</script>
</body>
</html>
